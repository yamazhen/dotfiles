set -ga terminal-overrides ",xterm-256color*:Tc"
set-option -g default-terminal "xterm-256color"
set -s escape-time 0

set -g status-style 'bg=default fg=#ffffff'
set-option -g pane-border-style 'fg=white'
set-option -g pane-active-border-style 'fg=white'

unbind c
bind-key c new-window -c "#{pane_current_path}"

unbind '"'
bind '"' split-window -v -c "#{pane_current_path}"  # Vertical split

unbind '%'
bind '%' split-window -h -c "#{pane_current_path}"  # Horizontal split

#instakill panel
bind-key -r x kill-pane

#refresh config
bind r source-file ~/.tmux.conf
set -g base-index 1

#configure vim movement for copy paste
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

bind-key -r f run-shell "tmux neww ~/.config/tmux/tmux-sessionizer"
bind-key -r k run-shell "~/.config/tmux/kill-all-windows"
bind-key -r d popup -E "~/.config/tmux/session-manager"
bind-key -r t run-shell "~/.config/tmux/tmux-terminal"
bind-key -r l run-shell "~/.config/tmux/tmux-git"
bind-key -r s run-shell "~/.config/tmux/tmux-ssh"
