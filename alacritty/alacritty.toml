[general]
import = [
    "~/.config/alacritty/themes/ayu-dark.toml",
    "~/.config/alacritty/keybindings.toml"
]
[terminal]
shell = { program = "/opt/homebrew/bin/tmux", args = ["new-session", "-A", "-s", "default"]}
[env]
TERM="xterm-256color"
[window]
padding.x = 10
padding.y = 10
decorations = "None"
startup_mode = "Windowed"

option_as_alt = "Both"

[font]
normal = { family = "JetBrainsMono Nerd Font", style="Regular" }
size = 16
offset = { x = 0, y = 8 }
