[general]
import = [
    "~/.config/alacritty/themes/carbonfox.toml",
    "~/.config/alacritty/keybindings.toml"
]
[terminal]
shell = { program = "/opt/homebrew/bin/tmux", args = ["new-session", "-A", "-s", "default"]}
[env]
TERM="xterm-256color"
[window]
padding.x = 10
padding.y = 10
decorations = "Buttonless"
startup_mode = "Windowed"

opacity = 0.95
blur = true 
option_as_alt = "Both"

[font]
size = 16
offset = { x = 0, y = 4 }
